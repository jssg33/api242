<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Organizational Map Builder</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body { background: #f8f9fa; }
    .section-title { font-weight: bold; margin-top: 20px; }
    .clickable { cursor: pointer; }
    .card { margin-bottom: 10px; }
  </style>
</head>

<body class="p-4">

  <div class="container">
    <h1 class="mb-4">Organizational Map Builder</h1>

    <!-- COMPANY LIST -->
    <div id="companySection">
      <h3 class="section-title">Companies</h3>
      <div id="companyList" class="row"></div>
    </div>

    <!-- OU LIST -->
    <div id="ouSection" class="mt-4" style="display:none;">
      <h3 class="section-title">Organization Units</h3>
      <div id="ouList" class="row"></div>
    </div>

    <!-- BU LIST -->
    <div id="buSection" class="mt-4" style="display:none;">
      <h3 class="section-title">Business Units</h3>
      <div id="buList" class="row"></div>
    </div>

    <!-- EXECUTIVES / DIRECTORS / WORKERS -->
    <div id="peopleSection" class="mt-4" style="display:none;">
      <h3 class="section-title">People</h3>
      <div id="peopleList" class="row"></div>
    </div>
  </div>

  <script>
    const API = "https://api242.onrender.com/api";

    // -------------------------------
    // Load Companies
    // -------------------------------
    async function loadCompanies() {
      const res = await fetch(`${API}/companies`);
      const companies = await res.json();

      const container = document.getElementById("companyList");
      container.innerHTML = "";

      companies.forEach(c => {
        container.innerHTML += `
          <div class="col-md-4">
            <div class="card clickable" onclick="loadOUs('${c._id}')">
              <div class="card-body">
                <h5 class="card-title">${c.name}</h5>
                <p class="card-text">${c.city}, ${c.state}</p>
              </div>
            </div>
          </div>
        `;
      });
    }

    // -------------------------------
    // Load OUs for a Company
    // -------------------------------
    async function loadOUs(companyId) {
      const res = await fetch(`${API}/companies/${companyId}`);
      const company = await res.json();

      document.getElementById("ouSection").style.display = "block";

      const container = document.getElementById("ouList");
      container.innerHTML = "";

      company.organizationunits?.forEach(ou => {
        container.innerHTML += `
          <div class="col-md-4">
            <div class="card clickable" onclick="loadBUs('${ou.ouid}', '${companyId}')">
              <div class="card-body">
                <h5 class="card-title">${ou.ouname}</h5>
                <p class="card-text">OU ID: ${ou.ouid}</p>
              </div>
            </div>
          </div>
        `;
      });
    }

    // -------------------------------
    // Load BUs for an OU
    // -------------------------------
    async function loadBUs(ouid, companyId) {
      const res = await fetch(`${API}/companies/${companyId}`);
      const company = await res.json();

      const ou = company.organizationunits.find(o => o.ouid === ouid);

      document.getElementById("buSection").style.display = "block";

      const container = document.getElementById("buList");
      container.innerHTML = "";

      ou.businessunits?.forEach(bu => {
        container.innerHTML += `
          <div class="col-md-4">
            <div class="card clickable" onclick="loadPeople('${bu.buid}')">
              <div class="card-body">
                <h5 class="card-title">${bu.buname}</h5>
                <p class="card-text">BU ID: ${bu.buid}</p>
              </div>
            </div>
          </div>
        `;
      });
    }

    // -------------------------------
    // Load People for a BU
    // -------------------------------
    async function loadPeople(buid) {
      document.getElementById("peopleSection").style.display = "block";

      const container = document.getElementById("peopleList");
      container.innerHTML = "<p>Loading...</p>";

      // Fetch all people types
      const endpoints = [
        { name: "BU Executives", url: `${API}/buexecutives` },
        { name: "Directors", url: `${API}/directors` },
        { name: "Managing Directors", url: `${API}/managingdirectors` },
        { name: "Installers", url: `${API}/installers` },
        { name: "Installer Managers", url: `${API}/installermanagers` }
      ];

      container.innerHTML = "";

      for (const ep of endpoints) {
        const res = await fetch(ep.url);
        const list = await res.json();

        const filtered = list.filter(p => p.buid === buid);

        if (filtered.length > 0) {
          container.innerHTML += `<h4 class="mt-3">${ep.name}</h4>`;
        }

        filtered.forEach(p => {
          container.innerHTML += `
            <div class="col-md-4">
              <div class="card">
                <div class="card-body">
                  <h5 class="card-title">${p.fullname}</h5>
                  <p class="card-text">Username: ${p.username}</p>
                  <p class="card-text">Status: ${p.status}</p>
                </div>
              </div>
            </div>
          `;
        });
      }
    }

    // Load companies on page load
    loadCompanies();
  </script>

</body>
</html>
